<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGENT.X</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@600&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  margin: 0;
  background: #080c10;
  color: white;
  font-family: 'Syne', sans-serif;
}
.container {
  padding: 20px;
}
.card {
  background: #0d1219;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  border: 1px solid #1a2530;
}
.green {
  color: #00ff88;
  font-family: 'Space Mono', monospace;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App() {
  return (
    <div className="container">
      <h1>AGENT.X 🚀</h1>

      <div className="card">
        <h3>Today's Impressions</h3>
        <div className="green">48,291</div>
      </div>

      <div className="card">
        <h3>Followers Gained</h3>
        <div className="green">+284</div>
      </div>

      <div className="card">
        <h3>Threads Ready</h3>
        <div className="green">20 Threads</div>
      </div>

      <div className="card">
        <h3>Status</h3>
        <p>Your AI threads are ready for approval.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
