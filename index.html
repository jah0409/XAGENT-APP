<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AGENT.X — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050709; font-family: 'Syne', sans-serif; }

/* ── Token system ── */
:root {
  --bg:       #080c10;
  --surface:  #0d1219;
  --surface2: #111922;
  --border:   #1a2530;
  --border2:  #243040;
  --green:    #00ff88;
  --green-dim:#00ff8830;
  --green-mid:#00ff8860;
  --red:      #ff4455;
  --red-dim:  #ff445530;
  --text:     #e8edf2;
  --text2:    #8a9bb0;
  --text3:    #3a4a5a;
  --mono:     'Space Mono', monospace;
  --head:     'Syne', sans-serif;
}

.phone {
  width: 100%;
  height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--text);
  font-family: var(--head);
}

/* Status bar */
.sb {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  flex-shrink: 0;
}
.sb-icons { display: flex; align-items: center; gap: 6px; }
.sb-icon { font-size: 11px; }

/* Bottom nav */
.nav {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding: 8px 0 16px;
  flex-shrink: 0;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
}
.nav-label { font-size: 9px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.05em; }
.nav-item.on .nav-label { color: var(--green); }
.nav-icon-wrap {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SVG nav icons */
.nav-item.on .ni-path { stroke: var(--green); }
.ni-path { stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Scrollable content area */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  padding: 0 16px 8px;
  gap: 16px;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* Section header */
.sec {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sec-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.sec-action { font-size: 11px; font-family: var(--mono); color: var(--green); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.card-pad { padding: 14px 16px; }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 12px 10px;
}
.stat-num {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  letter-spacing: -0.03em;
}
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }

/* Hero card */
.hero-card {
  background: linear-gradient(135deg, #0d1f14 0%, #0d1219 60%, #101420 100%);
  border: 1px solid #1a3025;
  border-radius: 16px;
  padding: 20px 20px 16px;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, #00ff8815 0%, transparent 70%);
  border-radius: 50%;
}
.hero-label { font-size: 10px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.08em; margin-bottom: 6px; }
.hero-num {
  font-family: var(--mono);
  font-size: 38px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  letter-spacing: -0.04em;
}
.hero-sub { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: var(--mono); }
.hero-badge {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--green-dim);
  border: 1px solid var(--green-mid);
  color: var(--green);
  font-size: 10px;
  font-family: var(--mono);
  padding: 4px 8px;
  border-radius: 6px;
}

/* Progress bar */
.prog { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

/* Row list items */
.row-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.row-item:last-child { border-bottom: none; }

/* Thread rows */
.thread-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  flex-shrink: 0;
  width: 20px;
}
.thread-body { flex: 1; min-width: 0; }
.thread-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.thread-meta { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 2px; }
.thread-score {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  flex-shrink: 0;
}

/* Swipe indicator strip */
.swipe-strip {
  display: flex;
  justify-content: space-between;
  padding: 6px 16px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
  flex-shrink: 0;
}
.swipe-strip span.r { color: var(--red); }
.swipe-strip span.g { color: var(--green); }

/* Filter tabs */
.tabs {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 6px 4px;
  text-align: center;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  border-radius: 5px;
  cursor: pointer;
}
.tab.on { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-mid); }

/* Timeline dot list */
.timeline { display: flex; flex-direction: column; }
.tl-item { display: flex; gap: 10px; position: relative; }
.tl-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  width: 16px;
}
.tl-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  margin-top: 4px;
}
.tl-dot.active { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px var(--green); }
.tl-line {
  flex: 1;
  width: 1px;
  background: var(--border);
  margin: 2px 0;
  min-height: 10px;
}
.tl-content {
  flex: 1;
  padding-bottom: 14px;
}
.tl-tweet-num { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-bottom: 4px; }
.tl-tweet-text { font-size: 12px; color: var(--text); line-height: 1.55; }
.tl-edit-btn {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  border: 1px solid var(--border2);
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 6px;
  cursor: pointer;
}

/* Approve bar */
.approve-bar {
  display: flex;
  gap: 8px;
  padding: 10px 16px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn-approve {
  flex: 1;
  background: var(--green);
  color: #060e08;
  border: none;
  border-radius: 10px;
  padding: 14px 0;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.btn-reject {
  width: 48px;
  background: var(--red-dim);
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 10px;
  padding: 14px 0;
  font-family: var(--mono);
  font-size: 16px;
  cursor: pointer;
}

/* Chart bars */
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
.bc-bar {
  flex: 1;
  background: var(--surface2);
  border-radius: 3px 3px 0 0;
  min-height: 4px;
  position: relative;
}
.bc-bar.hi { background: var(--green-mid); }
.bc-bar.top { background: var(--green); }
.bc-label {
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text3);
  white-space: nowrap;
}

/* Topic rows */
.topic-row { display: flex; align-items: center; gap: 8px; }
.topic-rank { font-family: var(--mono); font-size: 10px; color: var(--green); width: 20px; flex-shrink: 0; }
.topic-name { flex: 1; font-size: 12px; color: var(--text); }
.topic-prog { width: 60px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.topic-prog-fill { height: 100%; background: var(--green); border-radius: 2px; }
.topic-val { font-family: var(--mono); font-size: 10px; color: var(--text3); width: 36px; text-align: right; }

/* Setting rows */
.setting-section { display: flex; flex-direction: column; gap: 2px; }
.setting-label-group { font-size: 11px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.06em; padding: 0 4px 4px; }
.setting-row {
  display: flex;
  align-items: center;
  padding: 13px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  gap: 10px;
}
.setting-row + .setting-row { border-top: none; border-radius: 0; margin-top: -1px; }
.setting-row:first-of-type { border-radius: 10px 10px 0 0; }
.setting-row:last-of-type { border-radius: 0 0 10px 10px; }
.setting-row:only-of-type { border-radius: 10px; }
.setting-key { flex: 1; font-size: 13px; color: var(--text); }
.setting-val { font-size: 12px; font-family: var(--mono); color: var(--text3); }
.setting-chevron { color: var(--text3); font-size: 12px; margin-left: 4px; }

/* Toggle */
.toggle { width: 36px; height: 20px; border-radius: 10px; position: relative; flex-shrink: 0; }
.toggle.on { background: var(--green); }
.toggle.off { background: var(--surface2); border: 1px solid var(--border2); }
.toggle-knob {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  top: 3px;
  transition: left 0.2s;
}
.toggle.on .toggle-knob { left: 19px; background: #050e07; }
.toggle.off .toggle-knob { left: 3px; background: var(--text3); }

/* X connect badge */
.x-row { display: flex; align-items: center; gap: 12px; }
.x-avatar {
  width: 36px; height: 36px;
  background: var(--text);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: var(--bg);
  font-family: var(--mono);
  flex-shrink: 0;
}
.connected-badge {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--green);
  border: 1px solid var(--green-mid);
  background: var(--green-dim);
  padding: 3px 7px;
  border-radius: 5px;
  margin-left: auto;
}

/* Notification banner */
.notif {
  background: linear-gradient(90deg, #0d1f14 0%, #0d1219 100%);
  border: 1px solid #1a3025;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.notif-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  flex-shrink: 0;
}
.notif-text { flex: 1; font-size: 12px; color: var(--text); line-height: 1.4; }
.notif-sub { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 2px; }
.notif-arrow { font-size: 14px; color: var(--green); flex-shrink: 0; }

/* Page header */
.page-header {
  padding: 8px 16px 0;
  flex-shrink: 0;
}
.page-title { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.03em; }
.page-sub { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-top: 2px; }

/* Back header */
.back-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px 0;
  flex-shrink: 0;
}
.back-btn { font-size: 20px; color: var(--text2); cursor: pointer; line-height: 1; }
.back-title { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; flex: 1; }
.back-action { font-size: 11px; font-family: var(--mono); color: var(--green); cursor: pointer; }

/* Divider */
.divider { height: 1px; background: var(--border); }

/* Queue row */
.queue-row { display: flex; align-items: center; gap: 10px; }
.queue-time { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 48px; flex-shrink: 0; }
.queue-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.queue-dot.posted { background: var(--green); }
.queue-dot.sched { background: var(--border2); }
.queue-thread { flex: 1; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-status { font-family: var(--mono); font-size: 9px; }
.queue-status.posted { color: var(--green); }
.queue-status.sched { color: var(--text3); }

/* Pill badge */
.pill {
  font-family: var(--mono);
  font-size: 9px;
  padding: 3px 7px;
  border-radius: 20px;
  flex-shrink: 0;
}
.pill-green { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-mid); }
.pill-dim { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

/* Glow score ring */
.score-ring {
  width: 52px; height: 52px;
  position: relative;
  flex-shrink: 0;
}
.score-ring svg { width: 100%; height: 100%; }
.score-ring-num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
}
</style>
</head>
<body>
<script type="text/babel">

// ── SVG Nav Icons ──────────────────────────────────────────────────────────
const IconHome = () => (
  <svg width="22" height="22" viewBox="0 0 22 22">
    <path className="ni-path" d="M3 9.5L11 3l8 6.5V19a1 1 0 01-1 1H14v-5H8v5H4a1 1 0 01-1-1V9.5z"/>
  </svg>
);
const IconThreads = () => (
  <svg width="22" height="22" viewBox="0 0 22 22">
    <path className="ni-path" d="M4 6h14M4 11h10M4 16h7"/>
  </svg>
);
const IconStats = () => (
  <svg width="22" height="22" viewBox="0 0 22 22">
    <path className="ni-path" d="M4 18V12M8 18V8M12 18V5M16 18V10M20 18V14"/>
  </svg>
);
const IconSettings = () => (
  <svg width="22" height="22" viewBox="0 0 22 22">
    <circle className="ni-path" cx="11" cy="11" r="3"/>
    <path className="ni-path" d="M11 2v2M11 18v2M2 11h2M18 11h2M4.2 4.2l1.4 1.4M16.4 16.4l1.4 1.4M4.2 17.8l1.4-1.4M16.4 5.6l1.4-1.4"/>
  </svg>
);
const IconAgent = () => (
  <svg width="22" height="22" viewBox="0 0 22 22">
    <circle className="ni-path" cx="11" cy="9" r="4"/>
    <path className="ni-path" d="M11 13v2M8 19c0-2 1.3-3.5 3-3.5s3 1.5 3 3.5"/>
    <path className="ni-path" d="M6 9a5 5 0 0110 0"/>
  </svg>
);

function BottomNav({ active }) {
  const items = [
    { id: 'home',     Icon: IconHome,     label: 'HOME' },
    { id: 'threads',  Icon: IconThreads,  label: 'THREADS' },
    { id: 'agent',    Icon: IconAgent,    label: 'AGENT' },
    { id: 'analytics',Icon: IconStats,    label: 'STATS' },
    { id: 'settings', Icon: IconSettings, label: 'CONFIG' },
  ];
  return (
    <nav className="nav">
      {items.map(({ id, Icon, label }) => (
        <div key={id} className={`nav-item ${active === id ? 'on' : ''}`}>
          <div className="nav-icon-wrap"><Icon /></div>
          <span className="nav-label">{label}</span>
        </div>
      ))}
    </nav>
  );
}

function StatusBar({ time = "9:41" }) {
  return (
    <div className="sb">
      <span style={{ fontWeight: 700 }}>{time}</span>
      <div className="sb-icons">
        <span className="sb-icon">▲▲▲</span>
        <span className="sb-icon">WiFi</span>
        <span className="sb-icon">87%</span>
      </div>
    </div>
  );
}

function ScoreRing({ score }) {
  const r = 20, cx = 26, cy = 26, circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  return (
    <div className="score-ring">
      <svg viewBox="0 0 52 52">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1a2530" strokeWidth="3"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#00ff88" strokeWidth="3"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ * 0.25}
          strokeLinecap="round" />
      </svg>
      <div className="score-ring-num">{score}</div>
    </div>
  );
}

function Toggle({ on }) {
  return (
    <div className={`toggle ${on ? 'on' : 'off'}`}>
      <div className="toggle-knob"></div>
    </div>
  );
}

// ── SCREEN 1: HOME — "CONTROL DASHBOARD" ─────────────────────────────────
function HomeScreen() {
  const queue = [
    { time: '10:00', posted: true,  title: 'Why async patterns matter...' },
    { time: '11:30', posted: true,  title: 'The real cost of context switching' },
    { time: '13:00', posted: false, title: 'I built $50k MRR in 6 weeks...' },
    { time: '15:00', posted: false, title: 'Stop optimizing for followers...' },
    { time: '17:30', posted: false, title: 'Nobody talks about cold starts...' },
  ];
  return (
    <div className="phone">
      <StatusBar />
      <div style={{ padding: '10px 16px 0', flexShrink: 0 }}>
        <div style={{ fontSize: 11, fontFamily: 'Space Mono, monospace', color: 'var(--text3)', letterSpacing: '0.08em' }}>SAT · MAY 3, 2026</div>
        <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--text)', marginTop: 2, letterSpacing: '-0.03em' }}>
          Good morning, <span style={{ color: 'var(--green)' }}>@grok</span>
        </div>
      </div>

      <div className="content" style={{ paddingTop: 14 }}>

        {/* Notification banner */}
        <div className="notif" style={{ cursor: 'pointer' }}>
          <div className="notif-dot"></div>
          <div>
            <div className="notif-text"><strong>20 threads ready</strong> for review</div>
            <div className="notif-sub">Generated 4 min ago · tap to review</div>
          </div>
          <div className="notif-arrow">›</div>
        </div>

        {/* Hero stat — impressions */}
        <div className="hero-card">
          <div className="hero-label">TODAY'S IMPRESSIONS</div>
          <div className="hero-num">48,291</div>
          <div className="hero-sub">↑ 34% vs yesterday · 284 new followers</div>
          <div className="hero-badge">+34%</div>
          {/* Mini sparkline */}
          <div style={{ marginTop: 14 }}>
            <svg width="100%" height="32" viewBox="0 0 200 32" preserveAspectRatio="none">
              <defs>
                <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#00ff88" stopOpacity="0.3"/>
                  <stop offset="100%" stopColor="#00ff88" stopOpacity="0"/>
                </linearGradient>

              }}>⚡</div>
            )}
            <div style={{
              maxWidth: '78%',
              background: msg.role === 'user' ? 'var(--green)' : 'var(--surface)',
              border: msg.role === 'user' ? 'none' : `1px solid ${msg.type === 'action' ? 'var(--green-mid)' : 'var(--border)'}`,
              borderRadius: msg.role === 'user' ? '12px 12px 2px 12px' : '2px 12px 12px 12px',
              padding: '10px 12px',
              color: msg.role === 'user' ? '#050e07' : 'var(--text)',
            }}>
              <div style={{
                fontSize: 12, lineHeight: 1.55,
                fontFamily: 'Syne, sans-serif',
                whiteSpace: 'pre-wrap',
                fontWeight: msg.role === 'user' ? 600 : 400
              }}>
                {msg.text}
              </div>
              <div style={{
                fontFamily: 'Space Mono, monospace', fontSize: 8,
                color: msg.role === 'user' ? '#05200d' : 'var(--text3)',
                marginTop: 4
              }}>{msg.time}</div>
            </div>
          </div>
        ))}

        {loading && (
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8 }}>
            <div style={{
              width: 24, height: 24, borderRadius: '50%',
              background: 'var(--green-dim)', border: '1px solid var(--green-mid)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11
            }}>⚡</div>
            <div style={{
              background: 'var(--surface)', border: '1px solid var(--border)',
              borderRadius: '2px 12px 12px 12px', padding: '10px 14px'
            }}>
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                {[0,1,2].map(d => (
                  <div key={d} style={{
                    width: 5, height: 5, borderRadius: '50%',
                    background: 'var(--green)',
                    animation: `pulse 1.2s ease-in-out ${d * 0.2}s infinite`
                  }}></div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Quick suggestions */}
      <div style={{
        padding: '0 16px 8px', display: 'flex', gap: 6,
        overflowX: 'auto', flexShrink: 0, scrollbarWidth: 'none'
      }}>
        {suggestions.map((s, i) => (
          <button key={i} onClick={() => sendMessage(s)} style={{
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: 20, padding: '6px 12px', whiteSpace: 'nowrap',
            fontFamily: 'Space Mono, monospace', fontSize: 10,
            color: 'var(--text2)', cursor: 'pointer', flexShrink: 0
          }}>{s}</button>
        ))}
      </div>

      {/* Input bar */}
      <div style={{
        display: 'flex', gap: 8, padding: '8px 16px 24px',
        background: 'var(--bg)', borderTop: '1px solid var(--border)',
        flexShrink: 0, alignItems: 'center'
      }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && sendMessage(input)}
          placeholder="Ask AGENT anything..."
          style={{
            flex: 1, background: 'var(--surface)',
            border: '1px solid var(--border)', borderRadius: 10,
            padding: '12px 14px', color: 'var(--text)',
            fontFamily: 'Syne, sans-serif', fontSize: 13,
            outline: 'none'
          }}
        />
        <button
          onClick={() => sendMessage(input)}
          disabled={loading || !input.trim()}
          style={{
            width: 44, height: 44, borderRadius: 10,
            background: input.trim() ? 'var(--green)' : 'var(--surface)',
            border: input.trim() ? 'none' : '1px solid var(--border)',
            color: input.trim() ? '#050e07' : 'var(--text3)',
            fontSize: 18, cursor: 'pointer', flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}
        >↑</button>
      </div>

      <style>{`
        @keyframes pulse {
          0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
          40% { opacity: 1; transform: scale(1); }
        }
      `}</style>
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="AGENT.X — Mobile App" subtitle="Hi-fi screens · dark mode · 5 flows">

      <DCSection id="screens" title="Core Screens">

        <DCArtboard id="home" label="01 · Home — Control Dashboard" width={390} height={844}>
          <HomeScreen />
        </DCArtboard>

        <DCArtboard id="threads" label="02 · Threads — Swipe Machine" width={390} height={844}>
          <ThreadsScreen />
        </DCArtboard>

        <DCArtboard id="detail" label="03 · Thread Detail — Editor Mode" width={390} height={844}>
          <ThreadDetailScreen />
        </DCArtboard>

        <DCArtboard id="analytics" label="04 · Analytics — Growth Terminal" width={390} height={844}>
          <AnalyticsScreen />
        </DCArtboard>

        <DCArtboard id="settings" label="05 · Settings — Control Panel" width={390} height={844}>
          <SettingsScreen />
        </DCArtboard>

        <DCArtboard id="agent" label="06 · AGENT — AI Assistant" width={390} height={844}>
          <AgentScreen />
        </DCArtboard>

      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
